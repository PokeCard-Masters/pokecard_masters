name : Unit test

on:
  push:
    branches: ["test_training"]
  pull_request:
    branches: ["test_training"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    -uses: actions/checkout@v4
    -uses: astral-sh/setup-uv@v3
    -run: uv python install
    -run: uv sync --dev
    -run: cd pokecard_masters/project && uv run ./manage.py test --noinput